name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # setup-uv already created and activated a .venv (via python-version), so install
      # into it directly and run through uv, no separate `uv venv` step.
      - name: Install dependencies
        run: uv pip install -e ".[dev,wandb]"

      - name: Run tests
        env:
          WANDB_MODE: offline
        run: uv run pytest -q
